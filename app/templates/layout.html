<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Moov Metrics</title>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:700,400|Roboto:400,700&display=swap" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='images/cow-head.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/landing.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body class="modern-bg">

<!-- Dynamic Background -->
<div id="particles-js"></div>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-content">
    <a href="/" class="navbar-logo">
      <img src="{{ url_for('static', filename='images/cow-head.png') }}" alt="Moov Metrics Logo" height="32">
      <span class="logo-text">Moov Metrics</span>
    </a>
    <div class="navbar-links">
      <button class="btn btn-login navbar-login-toggle" type="button">Login</button>
      <div class="navbar-login-options" style="display:none;">
        <a href="/login/strava" class="btn btn-strava"><i class="fa fa-bolt"></i> Login with Strava</a>
        <a href="/login" class="btn btn-primary">Login with Email</a>
      </div>
    </div>
  </div>
</nav>

<!-- Main content -->
<main>
  {% block body %}{% endblock %}
</main>

<!-- Footer -->
<footer class="footer">
  <div class="footer-content">
    <span>© {{ year or 2025 }} Moov Metrics</span>
    <img src="{{ url_for('static', filename='images/api_logo_pwrdBy_strava_horiz_light.png') }}" alt="Powered by Strava" class="footer-strava">
  </div>
</footer>

<script>
// Initialize particles.js for dynamic background
particlesJS.load('particles-js', 'static/js/particles.json', function() {
  // Callback after loading
});

// Hide/show navbar on mobile scroll
(function() {
  let lastScrollY = window.scrollY;
  let ticking = false;
  const navbar = document.querySelector('.navbar');
  let isMobile = window.matchMedia('(max-width: 600px)').matches;

  function onScroll() {
    if (!isMobile) return;
    if (window.scrollY > lastScrollY && window.scrollY > 40) {
      // Scrolling down
      navbar.classList.add('navbar-hide');
    } else {
      // Scrolling up
      navbar.classList.remove('navbar-hide');
    }
    lastScrollY = window.scrollY;
    ticking = false;
  }

  function onResize() {
    isMobile = window.matchMedia('(max-width: 600px)').matches;
    if (!isMobile) {
      navbar.classList.remove('navbar-hide');
    }
  }

  window.addEventListener('scroll', function() {
    if (!ticking) {
      window.requestAnimationFrame(onScroll);
      ticking = true;
    }
  });
  window.addEventListener('resize', onResize);

  // Navbar login dropdown logic
  var loginToggle = document.querySelector('.navbar-login-toggle');
  var loginOptions = document.querySelector('.navbar-login-options');
  if (loginToggle && loginOptions) {
    loginToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      if (loginOptions.style.display === 'none' || loginOptions.style.display === '') {
        loginOptions.style.display = 'flex';
      } else {
        loginOptions.style.display = 'none';
      }
    });
    document.addEventListener('click', function(e) {
      if (!loginOptions.contains(e.target) && e.target !== loginToggle) {
        loginOptions.style.display = 'none';
      }
    });
  }
})();
</script>
</body>
</html>
